[uwsgi]
plugins=http,python3
threads=4

home=/usr
env=DJANGO_SETTINGS_MODULE=postgresqleu.settings
module=postgresqleu.wsgi:application
py-autoreload=1

# Allow loading the pgeu_system_settings.py module mounted into the
# container under this settings path.
pythonpath=/srv/settings

chdir=/srv/pgeu-system
socket=:8088
